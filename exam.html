<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Exams - Student Management System</title>
    <!-- Google Fonts & Boxicons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Global CSS -->
    <link rel="stylesheet" href="index.css">

    <style>
        .form-inline {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            align-items: end;
        }

        .form-inline button {
            margin-top: 0;
            padding: 12px;
            cursor: pointer;
        }

        .btn-delete {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #cc0000;
        }
    </style>
</head>

<body>

    <div class="dashboard-layout">

        <!-- 1. SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="bx bxs-graduation brand-icon"></i>
                <h2>EduManage</h2>
            </div>

            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="bx bxs-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="student.html" class="menu-item">
                    <i class="bx bxs-user-badge"></i>
                    <span>Students</span>
                </a>
                <a href="teacher.html" class="menu-item">
                    <i class="bx bxs-user-voice"></i>
                    <span>Teachers</span>
                </a>
                <a href="class.html" class="menu-item">
                    <i class="bx bxs-door-open"></i>
                    <span>Classes</span>
                </a>
                <a href="subject.html" class="menu-item">
                    <i class="bx bxs-book-bookmark"></i>
                    <span>Subjects</span>
                </a>
                <a href="attendance.html" class="menu-item">
                    <i class="bx bx-calendar-check"></i>
                    <span>Attendance</span>
                </a>
                <a href="fee.html" class="menu-item">
                    <i class="bx bxs-credit-card"></i>
                    <span>Fees</span>
                </a>
                <a href="exam.html" class="menu-item active">
                    <i class="bx bxs-edit-alt"></i>
                    <span>Exams</span>
                </a>
                <a href="report.html" class="menu-item">
                    <i class="bx bxs-bar-chart-alt-2"></i>
                    <span>Reports</span>
                </a>
                <a href="role.html" class="menu-item">
                    <i class="bx bxs-user-account"></i>
                    <span>User Roles</span>
                </a>
                <a href="setting.html" class="menu-item">
                    <i class="bx bxs-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="index.html" class="menu-item logout">
                    <i class="bx bx-log-out"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- 2. MAIN WRAPPER -->
        <div class="main-wrapper">

            <header class="topbar">
                <div class="topbar-left">
                    <button class="toggle-sidebar" id="toggleSidebar">
                        <i class="bx bx-menu"></i>
                    </button>
                    <div class="search-wrapper">
                        <i class="bx bx-search"></i>
                        <input type="text" id="globalSearch" placeholder="Search exams...">
                    </div>
                </div>

                <div class="topbar-right">
                    <div class="notification-icon">
                        <i class="bx bx-bell"></i>
                        <span class="badge"></span>
                    </div>
                    <div class="user-profile">
                        <div class="profile-info">
                            <span class="user-name">Admin User</span>
                            <span class="user-role">Super Admin</span>
                        </div>
                        <div class="profile-avatar">A</div>
                    </div>
                </div>
            </header>

            <main class="main-content">
                <div class="page-header">
                    <h1>Exam Schedule & Management</h1>
                    <p>Create examination schedules and record student marks.</p>
                </div>

                <div class="content-body">

                    <!-- ADD EXAM FORM -->
                    <div class="data-card" style="margin-bottom: 25px;">
                        <div class="card-header">
                            <h2>Schedule New Exam</h2>
                        </div>
                        <form id="examForm" class="form-inline">
                            <div class="form-group">
                                <label for="examName">Exam Title</label>
                                <input type="text" id="examName" placeholder="e.g. Mid-Term 2026" required>
                            </div>

                            <div class="form-group">
                                <label for="examSubject">Subject</label>
                                <input type="text" id="examSubject" placeholder="e.g. Mathematics" required>
                            </div>

                            <div class="form-group">
                                <label for="examDate">Exam Date</label>
                                <input type="date" id="examDate" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border-color);" required>
                            </div>

                            <button type="submit" class="btn-login">Schedule Exam</button>
                        </form>
                    </div>

                    <!-- EXAMS TABLE -->
                    <div class="data-card">
                        <div class="card-header">
                            <h2>Scheduled Exams</h2>
                        </div>
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Exam Code</th>
                                        <th>Exam Title</th>
                                        <th>Subject</th>
                                        <th>Date</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="allExamsTable">
                                    <!-- Dynamic Rows -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </main>

        </div>
    </div>

    <!-- Main dynamic script -->
    <script src="script.js"></script>
</body>
</html>
