<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="index.css">
</head>

<body class="login-page">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Sign in to access your dashboard</p>
            </div>

            <!-- ==========================================
                 👉 CHANGE HERE: Form action ko "dashboard.html" kiya hai 
                 taaki button click hote hi dashboard page open ho sake.
                 ========================================== -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="login-username">Username or Email</label>
                    <input type="text" id="login-username" placeholder="Enter your username" required
                        autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required
                        autocomplete="current-password">
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">Login</button>
                <p style="text-align:center; color: var(--text-muted); font-size: 12px; margin-top: 14px;">
                    Demo credentials: <strong>admin</strong> / <strong>password123</strong>
                </p>
            </form>
        </div>
    </div>

    <!-- Main Script (For interactions/validations) -->
    <script src="script.js"></script>
</body>

</html>
